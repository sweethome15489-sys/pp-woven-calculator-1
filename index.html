<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PP Woven Calculator Pro</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="header">
<h1>PP Woven Calculator Pro</h1>
<p>Professional Fabric Cost Calculator</p>
</div>

<div class="card">

<h2>Fabric Details</h2>

<label>Width (CM)</label>
<input type="number" id="cm" placeholder="Enter Width">

<label>GSM</label>
<input type="number" id="gsm" placeholder="Enter GSM">

<label>Mesh</label>
<input type="text" id="mesh" placeholder="10×10">

<label>Denier</label>
<input type="number" id="denier" placeholder="590">

</div>

<div class="card">

<h2>Raw Material</h2>

<label>PP Rate (₹/kg)</label>
<input type="number" id="pp" placeholder="140">

<label>CaCO₃ Rate (₹/kg)</label>
<input type="number" id="co2" placeholder="42">

<label>PP %</label>
<input type="number" id="ppp" value="75">

<label>CaCO₃ %</label>
<input type="number" id="co2p" value="25">

<label>Conversion Charge</label>
<input type="number" id="conversion" placeholder="18">

<label>Lamination Charge</label>
<input type="number" id="lamination" placeholder="6">

<button onclick="calculate()">
Calculate
</button>

</div>

<div class="card">

<h2>Result</h2>

<div class="result">
<span>Width</span>
<b id="inch">-</b>
</div>

<div class="result">
<span>Weight</span>
<b id="gram">-</b>
</div>

<div class="result">
<span>Compound Rate</span>
<b id="compound">-</b>
</div>

<div class="result">
<span>Final Cost</span>
<b id="final">-</b>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
